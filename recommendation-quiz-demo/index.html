<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Recommendation Quiz</title>
  <!-- Apply saved/system theme before paint (no flash), same key as the app. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/hi/theme.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode"></button>

  <header class="site-header">
    <a class="site-back" href="/hi/">← Jhazzh</a>
    <span class="site-tag"><span class="site-dot"></span>Project 07</span>
  </header>

  <nav class="nav">
    <button class="nav__link is-active" data-view="quiz">Quiz</button>
    <button class="nav__link" data-view="admin">Admin</button>
  </nav>

  <!-- Quiz view -->
  <main class="quiz view is-active" id="view-quiz">
    <header class="quiz__header">
      <h1>Find your match</h1>
      <div class="quiz__progress"><span id="bar"></span></div>
    </header>
    <section class="quiz__body" id="body"><!-- rendered by JS --></section>
  </main>

  <!-- Admin view -->
  <main class="admin view" id="view-admin">
    <h1>Admin</h1>

    <section class="panel">
      <h2>Questions</h2>
      <div id="admin-questions"></div>
      <button class="btn" id="add-question">+ Add question</button>
    </section>

    <section class="panel">
      <h2>Products</h2>
      <div id="admin-products"></div>
      <button class="btn" id="add-product">+ Add product</button>
    </section>

    <section class="panel">
      <div class="panel__row">
        <h2>Saved results</h2>
        <button class="btn btn--ghost" id="clear-results">Clear</button>
      </div>
      <div id="admin-results"></div>
    </section>
  </main>

  <!-- Light/dark toggle, kept in sync with the rest of the site. -->
  <script>
    (function () {
      var btn = document.getElementById("theme-toggle");
      var root = document.documentElement;
      function sync() {
        var dark = root.getAttribute("data-theme") === "dark";
        btn.textContent = dark ? "☀" : "☾";
      }
      sync();
      btn.addEventListener("click", function () {
        var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        try { localStorage.setItem("theme", next); } catch (e) {}
        sync();
      });
    })();
  </script>

  <script src="data.js"></script>
  <script src="store.js"></script>
  <script src="quiz.js"></script>
  <script src="admin.js"></script>
  <script src="app.js"></script>
</body>
</html>
