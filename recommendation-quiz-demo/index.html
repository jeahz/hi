<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Recommendation Quiz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="site-back" href="/hi/">← Jeahz</a>
    <span class="site-tag"><span class="site-dot"></span>Project 07</span>
  </header>

  <nav class="nav">
    <button class="nav__link is-active" data-view="quiz">Quiz</button>
    <button class="nav__link" data-view="admin">Admin</button>
  </nav>

  <!-- Quiz view -->
  <main class="quiz view is-active" id="view-quiz">
    <header class="quiz__header">
      <h1>Find your match</h1>
      <div class="quiz__progress"><span id="bar"></span></div>
    </header>
    <section class="quiz__body" id="body"><!-- rendered by JS --></section>
  </main>

  <!-- Admin view -->
  <main class="admin view" id="view-admin">
    <h1>Admin</h1>

    <section class="panel">
      <h2>Questions</h2>
      <div id="admin-questions"></div>
      <button class="btn" id="add-question">+ Add question</button>
    </section>

    <section class="panel">
      <h2>Products</h2>
      <div id="admin-products"></div>
      <button class="btn" id="add-product">+ Add product</button>
    </section>

    <section class="panel">
      <div class="panel__row">
        <h2>Saved results</h2>
        <button class="btn btn--ghost" id="clear-results">Clear</button>
      </div>
      <div id="admin-results"></div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="store.js"></script>
  <script src="quiz.js"></script>
  <script src="admin.js"></script>
  <script src="app.js"></script>
</body>
</html>
